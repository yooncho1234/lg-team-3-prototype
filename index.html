<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>팀 3 소개</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      background: #f0f4f8;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    h1 {
      font-size: 2.5rem;
      color: #1a202c;
      margin-bottom: 2.5rem;
      letter-spacing: 0.05em;
    }

    .team {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .member {
      background: #ffffff;
      border-radius: 16px;
      padding: 2rem 2.5rem;
      text-align: center;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
      min-width: 160px;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .member:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
    }

    .avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      color: #fff;
      margin: 0 auto 1rem;
    }

    .name {
      font-size: 1.2rem;
      font-weight: 600;
      color: #2d3748;
    }
  </style>
</head>
<body>
  <h1>팀 3</h1>
  <div class="team">
    <div class="member">
      <div class="avatar">허</div>
      <div class="name">허민제</div>
    </div>
    <div class="member">
      <div class="avatar">이</div>
      <div class="name">이혜린</div>
    </div>
    <div class="member">
      <div class="avatar">조</div>
      <div class="name">조윤영</div>
    </div>
  </div>
</body>
</html>
