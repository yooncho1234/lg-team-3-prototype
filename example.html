<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>안녕하세요</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #a855f7 100%);
      font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 56px 64px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
      max-width: 420px;
      width: 90%;
    }

    h1 {
      font-size: 2.4rem;
      font-weight: 700;
      color: #3b0764;
      margin-bottom: 16px;
    }

    .subtitle {
      font-size: 1.1rem;
      color: #6b7280;
      margin-bottom: 36px;
    }

    button {
      background: linear-gradient(135deg, #667eea, #a855f7);
      color: white;
      border: none;
      padding: 14px 36px;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 50px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(168, 85, 247, 0.45);
    }

    button:active {
      transform: translateY(0);
    }

    .message {
      display: none;
      margin-top: 24px;
      font-size: 1.15rem;
      font-weight: 600;
      color: #7c3aed;
      animation: pop 0.3s ease;
    }

    .message.show {
      display: block;
    }

    @keyframes pop {
      0%   { transform: scale(0.7); opacity: 0; }
      70%  { transform: scale(1.1); }
      100% { transform: scale(1);   opacity: 1; }
    }

    footer {
      margin-top: 40px;
      font-size: 0.78rem;
      color: rgba(255, 255, 255, 0.65);
      letter-spacing: 0.03em;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>안녕하세요 👋</h1>
    <p class="subtitle">제 첫 번째 웹 페이지예요</p>
    <button onclick="showMessage()">눌러보기</button>
    <p class="message" id="msg">🎉 잘 작동해요!</p>
  </div>

  <footer>LG U+ Lifestyle Innovation Workshop</footer>

  <script>
    function showMessage() {
      const msg = document.getElementById('msg');
      msg.classList.remove('show');
      void msg.offsetWidth; // reflow to restart animation
      msg.classList.add('show');
    }
  </script>
</body>
</html>
