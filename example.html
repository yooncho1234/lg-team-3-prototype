<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>안녕하세요</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #6a0dad 0%, #9b59b6 50%, #c39bd3 100%);
      font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 48px 56px;
      text-align: center;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.2);
      max-width: 400px;
      width: 90%;
    }

    h1 {
      font-size: 2.4rem;
      color: #4a0080;
      margin-bottom: 16px;
    }

    p.subtitle {
      font-size: 1.1rem;
      color: #555;
      margin-bottom: 32px;
    }

    button {
      background: linear-gradient(135deg, #6a0dad, #9b59b6);
      color: white;
      border: none;
      padding: 14px 36px;
      font-size: 1rem;
      border-radius: 50px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(106, 13, 173, 0.4);
    }

    button:active { transform: translateY(0); }

    #message {
      margin-top: 24px;
      font-size: 1.2rem;
      color: #6a0dad;
      font-weight: 600;
      min-height: 1.6rem;
    }

    footer {
      margin-top: 40px;
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.75);
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>안녕하세요 👋</h1>
    <p class="subtitle">제 첫 번째 웹 페이지예요</p>
    <button onclick="showMessage()">눌러보기</button>
    <div id="message"></div>
  </div>
  <footer>LG U+ Lifestyle Innovation Workshop</footer>

  <script>
    function showMessage() {
      document.getElementById('message').textContent = '🎉 잘 작동해요!';
    }
  </script>
</body>
</html>
